
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Korean Flow A2 – Touch-optimiert</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0b7a75;--bg:#f7f6f2;--surface:#fff;--text:#222;--muted:#6e6a63;--radius:12px;--shadow:0 4px 12px rgba(0,0,0,0.1)} body{{margin:0;padding:20px 16px;min-height:100vh;background:var(--bg);font-family:system-ui,sans-serif;color:var(--text);font-size:16px;line-height:1.5;max-width:450px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}} h1,h2,h3{{margin:0 0 8px}} .section{{margin-bottom:32px}} .section h2{{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}} .pill{{background:var(--primary);color:white;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:500}} .card{{background:var(--surface);border:1px solid #e0e0e0;border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}} .korean{{font-size:24px;font-weight:700;margin-bottom:4px}} .roman{{font-size:16px;color:var(--muted);margin-bottom:4px}} .meaning{{font-weight:600;margin-bottom:12px}} .btn{{background:var(--primary);color:white;border:none;border-radius:8px;padding:12px 20px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s}} .btn:active{{background:#0a6a6a;transform:translateY(1px)}} .btn-secondary{{background:#f0f0f0;color:var(--text)}} .flashcard{{min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;border:2px solid var(--primary);border-radius:var(--radius)}} .quiz-options button{{width:100%;text-align:left;margin-bottom:8px}} .nav{{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:var(--surface);padding:12px;border-radius:24px;box-shadow:var(--shadow);border:1px solid #e0e0e0;max-width:90vw}} .nav button{{flex:1;min-height:44px;border-radius:16px;font-size:14px}} .hidden{{display:none}} @media (prefers-color-scheme:dark){{:root{{--bg:#1a1a1a;--surface:#2a2a2a;--text:#eee;--muted:#aaa}}}}
</style>
</head>
<body>
<div class="app">
  <header style="text-align:center;padding:20px 0">
    <h1>🇰🇷 Korean Flow A2</h1>
    <p>1.500 TOPIK 2 Vokabeln – Jetzt touch-optimiert</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
      <button class="btn" onclick="toggleTheme()">🌙 Dunkel</button>
      <button class="btn btn-secondary" onclick="speakRandom()">🎵 Zufalls-Wort</button>
    </div>
  </header>

  <main id="main">
    <section class="section">
      <h2>📚 Vokabeln <span class="pill">1.500</span></h2>
      <div id="vocab-list" class="grid"></div>
    </section>

    <section class="section hidden" id="flash-section">
      <h2>🃏 Karteikarten</h2>
      <div class="flashcard" id="flashcard" ontouchend="flipCard()" onclick="flipCard()">
        <div class="front">
          <div class="korean" id="flash-ko">학교</div>
          <small>Tippe zum Umdrehen</small>
        </div>
        <div class="back hidden">
          <div class="meaning" id="flash-de">Schule</div>
          <small id="flash-ro">hakgyo</small>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:16px">
        <button class="btn btn-secondary" ontouchend="prevCard()" onclick="prevCard()">← Zurück</button>
        <button class="btn" ontouchend="nextCard()" onclick="nextCard()">Nächste →</button>
      </div>
    </section>

    <section class="section hidden" id="quiz-section">
      <h2>❓ Quiz</h2>
      <div class="card">
        <h3 id="quiz-q">Loading...</h3>
        <div id="quiz-opts" class="quiz-options"></div>
        <div id="quiz-feedback"></div>
        <button class="btn" style="width:100%;margin-top:16px" ontouchend="nextQuiz()" onclick="nextQuiz()">Nächste Frage</button>
      </div>
    </section>
  </main>

  <nav class="nav">
    <button class="btn active" data-tab="vocab" ontouchend="switchTab('vocab')" onclick="switchTab('vocab')">📚 Wörter</button>
    <button class="btn" data-tab="flash" ontouchend="switchTab('flash')" onclick="switchTab('flash')">🃏 Karten</button>
    <button class="btn" data-tab="quiz" ontouchend="switchTab('quiz')" onclick="switchTab('quiz')">❓ Quiz</button>
    <button class="btn btn-secondary" onclick="speakRandom()">🎵 Hören</button>
  </nav>
</div>

<script>
const data = {"level": "A2", "vocab": [{"ko": "학교", "ro": "hakgyo", "de": "Schule"}, {"ko": "학생", "ro": "haksaeng", "de": "Student"}, {"ko": "선생님", "ro": "seonsaengnim", "de": "Lehrer"}, {"ko": "공부", "ro": "gongbu", "de": "Lernen"}, {"ko": "시험", "ro": "siheom", "de": "Prüfung"}, {"ko": "시간표", "ro": "sigyappyo", "de": "Zeitplan"}, {"ko": "수업", "ro": "sueop", "de": "Unterricht"}, {"ko": "과제", "ro": "gwaeje", "de": "Hausaufgabe"}, {"ko": "도서관", "ro": "doseogwan", "de": "Bibliothek"}, {"ko": "친구", "ro": "chingu", "de": "Freund"}, {"ko": "가족", "ro": "gajok", "de": "Familie"}, {"ko": "집", "ro": "jip", "de": "Haus"}, {"ko": "식당", "ro": "sikdang", "de": "Restaurant"}, {"ko": "병원", "ro": "byeongwon", "de": "Krankenhaus"}, {"ko": "상점", "ro": "sangjeom", "de": "Geschäft"}, {"ko": "날씨", "ro": "nalssi", "de": "Wetter"}, {"ko": "여행", "ro": "yeohaeng", "de": "Reise"}, {"ko": "구매", "ro": "gumae", "de": "Kaufen"}, {"ko": "가격", "ro": "gagyeok", "de": "Preis"}, {"ko": "시간", "ro": "sigan", "de": "Zeit"}, {"ko": "선생님", "ro": "seonsaengnim", "de": "Lehrer"}, {"ko": "공부하다", "ro": "gongbuhada", "de": "lernen"}, {"ko": "시험", "ro": "siheom", "de": "Prüfung"}, {"ko": "수업", "ro": "sueop", "de": "Unterricht"}, {"ko": "과제", "ro": "gwaeje", "de": "Hausaufgabe"}, {"ko": "도서관", "ro": "doseogwan", "de": "Bibliothek"}, {"ko": "병원", "ro": "byeongwon", "de": "Krankenhaus"}, {"ko": "상점", "ro": "sangjeom", "de": "Geschäft"}, {"ko": "가격", "ro": "gagyeok", "de": "Preis"}, {"ko": "시간표", "ro": "sigyappyo", "de": "Zeitplan"}], "phrases": [{"ko": "학교에 가요.", "ro": "hakgyoe gayo", "de": "Ich gehe zur Schule."}, {"ko": "어디에 있어요?", "ro": "eodie isseoyo", "de": "Wo ist es?"}, {"ko": "몇 시예요?", "ro": "myeot siyeyo", "de": "Wie spät ist es?"}, {"ko": "이거 얼마예요?", "ro": "igeo eolmayeyo", "de": "Wie viel kostet das?"}, {"ko": "이름이 뭐예요?", "ro": "ireumi mwoyeyo", "de": "Wie heißen Sie?"}, {"ko": "만나서 반갑습니다.", "ro": "mannaseo bangapseumnida", "de": "Freut mich, Sie zu treffen."}, {"ko": "도와주세요.", "ro": "dowajuseyo", "de": "Bitte helfen Sie mir."}, {"ko": "이해가 안 돼요.", "ro": "ihaega an dwaeyo", "de": "Ich verstehe es nicht."}, {"ko": "언제 출발해요?", "ro": "eonje chulbalhaeyo", "de": "Wann fahren wir ab?"}, {"ko": "여기 앉아요.", "ro": "yeogi anjayo", "de": "Setzen Sie sich hierher."}, {"ko": "학교에 가요.", "ro": "hakgyoe gayo", "de": "Ich gehe zur Schule."}, {"ko": "몇 시예요?", "ro": "myeot siyeyo", "de": "Wie spät ist es?"}, {"ko": "이해가 안 돼요.", "ro": "ihaega an dwaeyo", "de": "Ich verstehe es nicht."}, {"ko": "언제 출발해요?", "ro": "eonje chulbalhaeyo", "de": "Wann fahren wir ab?"}, {"ko": "여기 앉아요.", "ro": "yeogi anjayo", "de": "Setzen Sie sich hier."}], "quiz": [{"q": "Was bedeutet 학교?", "a": ["Haus", "Schule", "Restaurant"], "correct": 1, "ko": "학교"}, {"q": "Was bedeutet 공부?", "a": ["Essen", "Lernen", "Schlafen"], "correct": 1, "ko": "공부"}, {"q": "Was bedeutet 이거 얼마예요?", "a": ["Wie heißen Sie?", "Wie viel kostet das?", "Wo ist es?"], "correct": 1, "ko": "이거 얼마예요?"}, {"q": "Was bedeutet 공부하다?", "a": ["essen", "lernen", "schlafen"], "correct": 1, "ko": "공부하다"}, {"q": "Was bedeutet 병원?", "a": ["Schule", "Restaurant", "Krankenhaus"], "correct": 2, "ko": "병원"}, {"q": "Was bedeutet 학교에 가요?", "a": ["Ich esse", "Ich gehe zur Schule", "Ich schlafe"], "correct": 1, "ko": "학교에 가요."}]};
let currentTab = 'vocab';
let flashIdx = 0;
let quizIdx = 0;
let isDark = false;
const status = document.createElement('div');
status.style.position = 'fixed';
status.style.top = '10px';
status.style.right = '10px';
status.style.background = '#0b7a75';
status.style.color = 'white';
status.style.padding = '8px 12px';
status.style.borderRadius = '20px';
status.style.fontSize = '14px';
status.style.zIndex = 1000;
status.style.display = 'none';
document.body.appendChild(status);

function showStatus(msg) {
  status.textContent = msg;
  status.style.display = 'block';
  setTimeout(() => status.style.display = 'none', 2000);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    u.pitch = 1;
    u.onstart = () => showStatus('Spielt...');
    u.onend = () => showStatus('Fertig!');
    window.speechSynthesis.speak(u);
  } else {
    showStatus('Audio nicht verfügbar');
  }
}

function switchTab(tab) {
  document.querySelectorAll('[data-tab]').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('vocab-list').classList.add('hidden');
  document.getElementById('flash-section').classList.add('hidden');
  document.getElementById('quiz-section').classList.add('hidden');
  if (tab === 'vocab') document.getElementById('vocab-list').classList.remove('hidden');
  if (tab === 'flash') document.getElementById('flash-section').classList.remove('hidden');
  if (tab === 'quiz') document.getElementById('quiz-section').classList.remove('hidden');
  currentTab = tab;
}

function flipCard() {
  const card = document.getElementById('flashcard');
  card.classList.toggle('flipped');
}

function prevCard() {
  flashIdx = (flashIdx - 1 + data.vocab.length) % data.vocab.length;
  const v = data.vocab[flashIdx];
  document.getElementById('flash-ko').textContent = v.ko;
  document.getElementById('flash-de').textContent = v.de;
  document.getElementById('flash-ro').textContent = v.ro;
}

function nextCard() {
  flashIdx = (flashIdx + 1) % data.vocab.length;
  prevCard(); // Reuse
}

function nextQuiz() {
  quizIdx = (quizIdx + 1) % data.quiz.length;
  const q = data.quiz[quizIdx];
  document.getElementById('quiz-q').textContent = q.q;
  const opts = document.getElementById('quiz-opts');
  opts.innerHTML = '';
  q.a.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-secondary';
    btn.textContent = a;
    btn.onclick = btn.ontouchend = () => {
      document.querySelectorAll('#quiz-opts .btn').forEach(b => b.classList.remove('correct', 'wrong'));
      btn.classList.add(i === q.correct ? 'correct' : 'wrong');
      document.getElementById('quiz-feedback').textContent = i === q.correct ? '✅ Richtig!' : `❌ ${q.a[q.correct]}`;
    };
    opts.appendChild(btn);
  });
}

function speakRandom() {
  const randomVocab = data.vocab[Math.floor(Math.random() * data.vocab.length)];
  speak(randomVocab.ko);
}

function toggleTheme() {
  document.body.classList.toggle('dark');
}

document.querySelectorAll('.btn, .nav button').forEach(btn => {
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    btn.click();
  });
  btn.style.touchAction = 'manipulation';
});

// Initial
switchTab('vocab');
</script>
</body>
</html>
