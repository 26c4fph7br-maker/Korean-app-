<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Korean Flow">
<title>Korean Flow A2</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"] {
  --text-xs: clamp(.75rem,.7rem + .25vw,.875rem);
  --text-base: clamp(1rem,.95rem + .25vw,1.05rem);
  --text-lg: clamp(1.125rem,1rem + .75vw,1.35rem);
  --text-xl: clamp(1.5rem,1.2rem + 1.25vw,2rem);
  --space-1: .25rem;
  --space-2: .5rem;
  --space-3: .75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --radius-sm: .75rem;
  --radius-md: 1rem;
  --radius-lg: 1.35rem;
  --radius-xl: 1.75rem;
  --radius-full: 9999px;
  --color-bg: #f7f6f2;
  --color-surface: #ffffff;
  --color-surface-2: #f2f1ec;
  --color-border: #ddd8d2;
  --color-text: #222018;
  --color-text-muted: #6e6a63;
  --color-text-faint: #9d978f;
  --color-primary: #0b7a75;
  --color-primary-2: #7ecfc5;
  --color-primary-soft: #d9eeea;
  --color-accent: #f5b54c;
  --color-success: #4b7d2a;
  --color-danger: #b14455;
  --shadow-sm: 0 6px 18px rgba(33,30,23,.08);
  --shadow-md: 0 16px 40px rgba(33,30,23,.12);
  --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-korean: 'Noto Sans KR', sans-serif;
}
[data-theme="dark"] {
  --color-bg: #151513;
  --color-surface: #1d1d1a;
  --color-surface-2: #252420;
  --color-border: #34332f;
  --color-text: #f1eee8;
  --color-text-muted: #b7b2aa;
  --color-text-faint: #8a867f;
  --color-primary: #6bc8be;
  --color-primary-2: #2b8d85;
  --color-primary-soft: #213533;
  --color-accent: #efbd66;
  --color-success: #8fb46b;
  --color-danger: #db7c8e;
  --shadow-sm: 0 8px 24px rgba(0,0,0,.24);
  --shadow-md: 0 20px 50px rgba(0,0,0,.35);
}
*,:before,:after { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  margin: 0;
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.5;
  background: var(--color-bg);
  color: var(--color-text);
}
button,input { font: inherit; }
button {
  border: 0;
  background: none;
  color: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
h1,h2,h3,p { margin: 0; }

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) var(--space-4) calc(6rem + env(safe-area-inset-bottom));
  position: relative;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  padding: calc(var(--space-3) + env(safe-area-inset-top)) 0 var(--space-3);
  background: linear-gradient(to bottom, var(--color-bg) 75%, transparent);
}

.topbar-inner,
.section-head,
.lesson-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

.logo {
  display: flex;
  align-items: center;
  gap: .8rem;
  font-weight: 800;
}
.logo-mark {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  display: grid;
  place-items: center;
  box-shadow: var(--shadow-sm);
}
.logo-mark svg { width: 22px; height: 22px; }

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: var(--color-surface);
  display: grid;
  place-items: center;
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.hero,
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  border-radius: var(--radius-lg);
}

.hero {
  background: linear-gradient(160deg, var(--color-surface), var(--color-primary-soft));
  padding: var(--space-6);
  display: grid;
  gap: var(--space-5);
  box-shadow: var(--shadow-md);
  border-radius: var(--radius-xl);
}

.eyebrow {
  font-size: var(--text-xs);
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--color-text-muted);
  font-weight: 700;
}

h1 {
  font-size: var(--text-xl);
  line-height: 1.08;
}

.hero p {
  color: var(--color-text-muted);
  max-width: 30ch;
}

.section {
  margin-top: var(--space-8);
  display: grid;
  gap: var(--space-4);
}

.section-head h2 { font-size: var(--text-lg); }

.pill,
.tag {
  padding: .4rem .7rem;
  border-radius: var(--radius-full);
  background: var(--color-primary-soft);
  color: var(--color-primary);
  font-size: var(--text-xs);
  font-weight: 700;
}

.lesson-grid,
.phrase-list {
  display: grid;
  gap: var(--space-3);
}

.lesson-card,
.phrase-card {
  padding: var(--space-4);
  border-radius: var(--radius-lg);
  display: grid;
  gap: var(--space-3);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
}

.korean {
  font-family: var(--font-korean);
  font-size: 1.55rem;
  font-weight: 700;
}

.muted { color: var(--color-text-muted); }

.btn {
  min-height: 44px;
  padding: .85rem 1rem;
  border-radius: 1rem;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  flex: 1;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
}

.btn-primary {
  background: var(--color-primary);
  color: #fff;
}

.btn-secondary {
  background: var(--color-surface-2);
  color: var(--color-text);
}

.flashcard {
  background: linear-gradient(180deg, var(--color-surface), var(--color-surface-2));
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  min-height: 220px;
  display: grid;
  place-items: center;
  text-align: center;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.flashcard small {
  display: block;
  color: var(--color-text-faint);
  margin-top: var(--space-2);
}

.flashcard .front,
.flashcard .back { display: none; }

.flashcard[data-side="front"] .front,
.flashcard[data-side="back"] .back { display: block; }

.flashcard .front .korean,
.flashcard .back .latin {
  font-size: 2rem;
  font-weight: 800;
}

.quiz-options {
  display: grid;
  gap: .65rem;
  margin-top: var(--space-3);
}

.option {
  width: 100%;
  min-height: 48px;
  padding: .85rem 1rem;
  border-radius: 1rem;
  background: var(--color-surface-2);
  text-align: left;
  border: 1px solid transparent;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
}

.option.correct {
  background: var(--color-success);
  color: #fff;
}

.option.wrong {
  background: var(--color-danger);
  color: #fff;
}

.feedback {
  min-height: 1.4rem;
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  margin-top: var(--space-2);
}

.bottom-nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  width: min(430px,100%);
  padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--color-bg) 86%, transparent);
  backdrop-filter: blur(14px);
  z-index: 100;
}

.nav-shell {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: var(--space-2);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: var(--space-2);
  border-radius: 1.4rem;
  box-shadow: var(--shadow-md);
}

.nav-item {
  min-height: 52px;
  border-radius: 1rem;
  display: grid;
  place-items: center;
  gap: .15rem;
  color: var(--color-text-muted);
  font-size: 12px;
  font-weight: 700;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
}

.nav-item.active {
  background: var(--color-primary-soft);
  color: var(--color-primary);
}

.hidden { display: none !important; }

@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M7 6h10"/>
            <path d="M7 12h7"/>
            <path d="M7 18h10"/>
            <circle cx="17" cy="12" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div style="font-size:var(--text-xs);color:var(--color-text-muted);font-weight:700;letter-spacing:.06em">TOPIK A2</div>
          <div>Korean Flow</div>
        </div>
      </div>
      <button class="icon-btn" id="theme-btn" aria-label="Theme wechseln">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="eyebrow">TOPIK Level 2</div>
      <h1>Koreanisch A2 lernen</h1>
      <p>Perfekte App mit Vokabeln, Audio, Karten und Quiz. Alles klickbar auf iPhone.</p>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Vokabeln</h2>
        <span class="pill">30 A2</span>
      </div>
      <div class="lesson-grid" id="vocab-list"></div>
    </section>

    <section class="section hidden" id="phrase-section">
      <div class="section-head">
        <h2>Sätze</h2>
        <span class="pill">15</span>
      </div>
      <div class="phrase-list" id="phrase-list"></div>
    </section>

    <section class="section hidden" id="flash-section">
      <div class="section-head">
        <h2>Karteikarten</h2>
        <span class="pill">Touch</span>
      </div>
      <button class="flashcard" id="flash-card" data-side="front">
        <div class="front">
          <div class="korean" id="flash-ko">학교</div>
          <small>Tippe zum Drehen</small>
        </div>
        <div class="back">
          <div class="meaning" id="flash-meaning">Schule</div>
          <small id="flash-roman">hakgyo</small>
        </div>
      </button>
      <div class="lesson-actions">
        <button class="btn btn-secondary" id="flash-prev">← Zurück</button>
        <button class="btn btn-primary" id="flash-next">Nächste →</button>
      </div>
    </section>

    <section class="section hidden" id="quiz-section">
      <div class="section-head">
        <h2>Quiz</h2>
        <span class="pill">6 Fragen</span>
      </div>
      <div class="card" style="padding:20px">
        <h3 id="quiz-question">Loading...</h3>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="feedback" id="quiz-feedback"></div>
        <button class="btn btn-primary" id="quiz-next" style="width:100%;margin-top:16px">Nächste</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <div class="nav-shell">
      <button class="nav-item active" data-target="vocab-section">📚 Wörter</button>
      <button class="nav-item" data-target="phrase-section">📝 Sätze</button>
      <button class="nav-item" data-target="flash-section">🃏 Karten</button>
      <button class="nav-item" data-target="quiz-section">❓ Quiz</button>
    </div>
  </nav>
</div>

<script>
const vocabData = [
  {ko:'학교', ro:'hakgyo', de:'Schule'},
  {ko:'학생', ro:'haksaeng', de:'Student'},
  {ko:'선생님', ro:'seonsaengnim', de:'Lehrer'},
  {ko:'공부', ro:'gongbu', de:'Lernen'},
  {ko:'시험', ro:'siheom', de:'Prüfung'},
  {ko:'시간표', ro:'sigyappyo', de:'Zeitplan'},
  {ko:'수업', ro:'sueop', de:'Unterricht'},
  {ko:'과제', ro:'gwaeje', de:'Hausaufgabe'},
  {ko:'도서관', ro:'doseogwan', de:'Bibliothek'},
  {ko:'친구', ro:'chingu', de:'Freund'},
  {ko:'가족', ro:'gajok', de:'Familie'},
  {ko:'집', ro:'jip', de:'Haus'},
  {ko:'식당', ro:'sikdang', de:'Restaurant'},
  {ko:'병원', ro:'byeongwon', de:'Krankenhaus'},
  {ko:'상점', ro:'sangjeom', de:'Geschäft'},
  {ko:'날씨', ro:'nalssi', de:'Wetter'},
  {ko:'여행', ro:'yeohaeng', de:'Reise'},
  {ko:'구매', ro:'gumae', de:'Kaufen'},
  {ko:'가격', ro:'gagyeok', de:'Preis'},
  {ko:'시간', ro:'sigan', de:'Zeit'},
  {ko:'공부하다', ro:'gongbuhada', de:'lernen'},
  {ko:'이해하다', ro:'ihaehada', de:'verstehen'},
  {ko:'언제', ro:'eonje', de:'wann'},
  {ko:'어디', ro:'eodi', de:'wo'},
  {ko:'왜', ro:'wae', de:'warum'},
  {ko:'무엇', ro:'mueot', de:'was'},
  {ko:'누구', ro:'nugu', de:'wer'},
  {ko:'이거', ro:'igeo', de:'das hier'},
  {ko:'저거', ro:'jeogeo', de:'das dort'},
  {ko:'필요하다', ro:'piryohada', de:'brauchen'}
];

const phraseData = [
  {ko:'학교에 가요', ro:'hakgyoe gayo', de:'Ich gehe zur Schule'},
  {ko:'몇 시예요?', ro:'myeot siyeyo', de:'Wie spät ist es?'},
  {ko:'이거 얼마예요?', ro:'igeo eolmayeyo', de:'Wie viel kostet das?'},
  {ko:'이름이 뭐예요?', ro:'ireumi mwoyeyo', de:'Wie heißen Sie?'},
  {ko:'만나서 반갑습니다', ro:'mannaseo bangapseumnida', de:'Freut mich, Sie kennenzulernen'},
  {ko:'도와주세요', ro:'dowajuseyo', de:'Bitte helfen Sie mir'},
  {ko:'이해가 안 돼요', ro:'ihaega an dwaeyo', de:'Ich verstehe es nicht'},
  {ko:'언제 출발해요?', ro:'eonje chulbalhaeyo', de:'Wann fahren wir ab?'},
  {ko:'여기 앉아요', ro:'yeogi anjayo', de:'Setzen Sie sich hier'},
  {ko:'오늘 날씨가 좋아요', ro:'oneul nalssiga joayo', de:'Heute ist das Wetter gut'},
  {ko:'저는 독일에서 왔어요', ro:'jeoneun dogileseo wasseoyo', de:'Ich komme aus Deutschland'},
  {ko:'저는 학생이에요', ro:'jeoneun haksaengieyo', de:'Ich bin Student'},
  {ko:'지금 공부해요', ro:'jigeum gongbuhaeyo', de:'Ich lerne gerade'},
  {ko:'집에 가고 싶어요', ro:'jibee gago sipeoyo', de:'Ich möchte nach Hause gehen'},
  {ko:'화장실이 어디예요?', ro:'hwajangsiri eodiyeyo', de:'Wo ist die Toilette?'}
];

const quizData = [
  {q:'Was bedeutet 학교?', a:['Haus','Schule','Auto'], correct:1},
  {q:'Was bedeutet 공부?', a:['Essen','Lernen','Schlafen'], correct:1},
  {q:'Was bedeutet 병원?', a:['Schule','Krankenhaus','Restaurant'], correct:1},
  {q:'Was bedeutet 친구?', a:['Lehrer','Freund','Student'], correct:1},
  {q:'Was bedeutet 언제?', a:['wo','wann','warum'], correct:1},
  {q:'Was bedeutet 이거?', a:['das dort','das hier','das wo'], correct:1}
];

let flashIndex = 0;
let quizIndex = 0;
let currentTheme = 'light';

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }
}

function loadVocab() {
  document.getElementById('vocab-list').innerHTML = vocabData.map(v => `
    <div class="lesson-card">
      <div class="korean">${v.ko}</div>
      <div class="roman">${v.ro}</div>
      <p class="muted">${v.de}</p>
      <div class="lesson-actions">
        <button class="btn btn-primary" onclick="speak('${v.ko}')">🎵 Audio</button>
      </div>
    </div>
  `).join('');
}

function loadPhrases() {
  document.getElementById('phrase-list').innerHTML = phraseData.map(p => `
    <div class="phrase-card">
      <div class="korean">${p.ko}</div>
      <div class="roman">${p.ro}</div>
      <p class="muted">${p.de}</p>
      <div class="lesson-actions">
        <button class="btn btn-primary" onclick="speak('${p.ko}')">🎵 Hören</button>
      </div>
    </div>
  `).join('');
}

function updateFlash() {
  const v = vocabData[flashIndex];
  document.getElementById('flash-ko').textContent = v.ko;
  document.getElementById('flash-meaning').textContent = v.de;
  document.getElementById('flash-roman').textContent = v.ro;
  document.getElementById('flash-card').dataset.side = 'front';
}

function updateQuiz() {
  const q = quizData[quizIndex];
  document.getElementById('quiz-question').textContent = q.q;
  const opts = document.getElementById('quiz-options');
  opts.innerHTML = '';
  q.a.forEach((answer, index) => {
    const b = document.createElement('button');
    b.className = 'option';
    b.textContent = answer;
    b.onclick = () => {
      opts.querySelectorAll('.option').forEach(x => x.classList.remove('correct', 'wrong'));
      if (index === q.correct) {
        b.classList.add('correct');
        document.getElementById('quiz-feedback').innerHTML = '<span style="color:var(--color-success)">✅ Richtig!</span>';
      } else {
        b.classList.add('wrong');
        opts.children[q.correct].classList.add('correct');
        document.getElementById('quiz-feedback').innerHTML = '<span style="color:var(--color-danger)">❌ Falsch!</span> Richtige Antwort: ' + q.a[q.correct];
      }
    };
    opts.appendChild(b);
  });
  document.getElementById('quiz-feedback').textContent = '';
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('button, .nav-item, .flashcard').forEach(el => {
    el.addEventListener('touchend', e => {
      e.preventDefault();
      e.currentTarget.click();
    });
  });

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelector('.nav-item.active').classList.remove('active');
      this.classList.add('active');
      showSection(this.dataset.target);
    });
  });

  document.getElementById('theme-btn').addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = currentTheme;
  });

  document.getElementById('flash-card').onclick = function() {
    this.dataset.side = this.dataset.side === 'front' ? 'back' : 'front';
  };

  document.getElementById('flash-prev').onclick = () => {
    flashIndex = (flashIndex - 1 + vocabData.length) % vocabData.length;
    updateFlash();
  };
  document.getElementById('flash-next').onclick = () => {
    flashIndex = (flashIndex + 1) % vocabData.length;
    updateFlash();
  };

  document.getElementById('quiz-next').onclick = () => {
    quizIndex = (quizIndex + 1) % quizData.length;
    updateQuiz();
  };

  loadVocab();
  loadPhrases();
  updateFlash();
  updateQuiz();
  showSection('vocab-section');
});
</script>
</body>
</html>
